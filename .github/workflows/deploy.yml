name: Verify, migrate and deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Branch ou SHA para validar
        required: true
        default: main
        type: string
      run_service_diagnostics:
        description: Executar diagnóstico manual dos serviços
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  migration-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      requires-local-db: ${{ steps.filter.outputs.database }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            database:
              - 'supabase/migrations/**'
              - 'supabase/**/*.sql'

  local-migration-validation:
    if: github.event_name == 'pull_request' && needs.migration-changes.outputs.requires-local-db == 'true'
    needs: migration-changes
    name: Apply migrations against local Supabase PostgreSQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Start local Supabase PostgreSQL
        run: npx --yes supabase@2.39.2 start
      - name: Apply all migrations to an empty local database
        run: npx --yes supabase@2.39.2 db reset --local
      - name: Verify Sprint 32 indexes and public search RPCs
        shell: bash
        run: |
          set -euo pipefail
          docker exec supabase_db_banco-de-solucoes psql -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          do $$
          begin
            if (select count(*) from pg_indexes where schemaname = 'public' and indexname in ('problems_search_document_idx', 'solutions_search_document_idx')) <> 2 then
              raise exception 'Sprint 32 full-text indexes were not created';
            end if;
          end
          $$;
          select count(*) from public.search_problems();
          select count(*) from public.search_solutions();
          SQL
      - name: Stop local Supabase
        if: always()
        run: npx --yes supabase@2.39.2 stop

  verify:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm test
      - name: Sprint 26 tests
        run: npm run test:sprint26
      - name: Reconciliation safety tests
        run: npm run test:reconciliation
      - name: Pending migration safety tests
        run: npm run test:pending-migrations
      - name: Check patch formatting
        run: git diff --check
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Preserve build for deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: pages-dist
          path: dist
          retention-days: 1

  production-preflight:
    if: github.event_name == 'workflow_dispatch'
    name: Validate production gates without deployment
    runs-on: ubuntu-latest
    environment: production-preflight
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Validate pending migrations
        run: npm run test:pending-migrations
      - name: Validate required Supabase secrets
        shell: bash
        run: |
          set +x
          for secret_name in SUPABASE_PROJECT_REF SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY
          do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done
      - name: Link Supabase project
        run: npx --yes supabase@2.39.2 link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Check migration baseline
        run: npm run check:migration-baseline
      - name: List local and remote migrations
        run: npx --yes supabase@2.39.2 migration list --linked
      - name: Preview database migrations without applying them
        run: npx --yes supabase@2.39.2 db push --dry-run

  service-diagnostics:
    if: github.event_name == 'workflow_dispatch' && inputs.run_service_diagnostics == true
    name: Run manual service diagnostics
    runs-on: ubuntu-latest
    environment: production-preflight
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run service diagnostics
        run: npm run check:database

  migrate-and-health:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Restore verified build
        uses: actions/download-artifact@v4
        with:
          name: pages-dist
          path: dist
      - name: Validate required Supabase secrets
        shell: bash
        run: |
          set +x
          for secret_name in \
            SUPABASE_PROJECT_REF \
            SUPABASE_ACCESS_TOKEN \
            SUPABASE_DB_PASSWORD \
            SUPABASE_URL \
            SUPABASE_SERVICE_ROLE_KEY
          do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "Missing required secret: ${secret_name}" >&2
              exit 1
            fi
          done
      - name: Link Supabase project
        run: npx --yes supabase@2.39.2 link --project-ref "$SUPABASE_PROJECT_REF"
      # Legacy recovery is manual; a normal deployment has one baseline gate.
      - name: Check migration baseline
        run: npm run check:migration-baseline
      - name: List local and remote migrations
        run: npx --yes supabase@2.39.2 migration list --linked
      - name: Validate pending migrations
        run: npm run test:pending-migrations
      - name: Apply database migrations after baseline
        run: npx --yes supabase@2.39.2 db push
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: migrate-and-health
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
